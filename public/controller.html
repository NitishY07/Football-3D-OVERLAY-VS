<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football GFX Controller</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: #fff; padding: 10px; margin: 0; }
    .container { max-width: 900px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 10px; }
    h1 { font-size: 1.5rem; margin-top: 0; padding-bottom: 10px; text-align: center; }
    .match-id { font-size: 0.8rem; color: #00ff88; text-align: center; margin-bottom: 15px; }
    
    /* Tabs */
    .tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #444; }
    .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #aaa; font-weight: bold; }
    .tab.active { color: #fff; border-bottom: 3px solid #00e5ff; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #aaa; }
    input[type="text"], textarea, select { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
    textarea { resize: vertical; min-height: 150px; font-family: monospace; font-size: 0.85rem;}
    textarea.subs { min-height: 100px; }
    
    .color-picker { display: flex; align-items: center; gap: 10px; }
    input[type="color"] { width: 50px; height: 40px; border: none; background: transparent; cursor: pointer; }
    input[type="file"] { margin-top: 5px; color: #ccc; font-size: 0.8rem;}
    
    .btn { display: block; width: 100%; padding: 15px; background: #00e5ff; color: #000; border: none; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    .btn-red { background: #ff2a5f; color: #fff; }
    .btn-green { background: #00ff88; color: #000; }
    .btn-blue { background: #007bff; color: #fff; }
    
    .flex-row { display: flex; gap: 20px; }
    .flex-row > div { flex: 1; }
    
    /* Team Columns for Lineup Tab */
    .team-col { background: #1e1e1e; padding: 15px; border-radius: 8px; border-top: 4px solid #444;}
    .team-col.home { border-top-color: #ff2a5f; }
    .team-col.away { border-top-color: #00e5ff; }
    .team-col h3 { margin-top: 0; text-align: center; color: #fff; font-size: 1.2rem; margin-bottom: 15px;}
    
    /* Player Input Rows */
    .player-row { display:flex; gap:5px; margin-bottom:5px; align-items:center; background:#252525; padding:5px; border-radius:5px; border-left: 2px solid #555;}
    .player-row input[type="text"], .player-row select { padding: 6px; font-size: 0.8rem; }
    
    @media (max-width: 600px) {
      .flex-row { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Broadcast Controller</h1>
    <div class="match-id" id="matchIdDisplay">Match ID: default</div>
    
    <!-- Tab Navigation -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('vs')">VS Graphic</div>
      <div class="tab" onclick="switchTab('lineups')">Lineups</div>
    </div>

    <!-- TAB 1: VS GRAPHIC -->
    <div id="tab-vs" class="tab-content active">
      <div class="flex-row">
        <div class="form-group">
          <label>Home Team</label>
          <input type="text" id="homeName" value="RED DEVILS" />
          <div class="color-picker">
            <input type="color" id="homeColor" value="#ff2a5f">
            <label style="margin:0">Color</label>
          </div>
          <label style="margin-top:10px">Custom Logo:</label>
          <input type="file" id="homeLogo" accept="image/*" />
        </div>
        
        <div class="form-group">
          <label>Away Team</label>
          <input type="text" id="awayName" value="BLUE EAGLES" />
          <div class="color-picker">
            <input type="color" id="awayColor" value="#00e5ff">
            <label style="margin:0">Color</label>
          </div>
          <label style="margin-top:10px">Custom Logo:</label>
          <input type="file" id="awayLogo" accept="image/*" />
        </div>
      </div>

      <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;" />
      <div class="form-group">
        <label>League Name</label>
        <input type="text" id="leagueName" value="PREMIER CHAMPIONSHIP" />
      </div>
      <div class="form-group">
        <label>Matchday Info</label>
        <input type="text" id="matchday" value="MATCHDAY 24" />
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="text" id="kickoffTime" value="20:45 CET" />
      </div>
      
      <button class="btn btn-green" onclick="sendUpdate()">Apply Text & Colors</button>
      <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;" />
      <button class="btn" onclick="animateIn()">PLAY IN VS GFX</button>
    </div>

    <!-- TAB 2: LINEUPS -->
    <div id="tab-lineups" class="tab-content">
      <div class="flex-row">
        
        <!-- HOME COLUMN -->
        <div class="team-col home">
          <h3>HOME TEAM</h3>
          <div class="form-group">
            <label>Coach Name</label>
            <input type="text" id="homeCoach" value="Ole Gunnar Solskjaer" />
          </div>
          <div class="form-group">
            <label>Formation</label>
            <select id="homeFormation">
              <option value="4-3-3">4-3-3</option>
              <option value="4-4-2">4-4-2</option>
              <option value="3-5-2">3-5-2</option>
              <option value="4-2-3-1">4-2-3-1</option>
              <option value="5-3-2">5-3-2</option>
            </select>
          </div>
          <div class="form-group">
            <label>Starting XI (Required for Cinematic)</label>
            <div id="homePlayersContainer"></div>
          </div>
          <div class="form-group">
            <label>Substitutes (Number Name)</label>
            <textarea id="homeSubsText" class="subs">26 Henderson
3 Bailly
27 Telles
31 Matic</textarea>
          </div>
          <button class="btn btn-blue" onclick="showLineup('home')" id="homeLineupBtn">SHOW HOME LINEUP</button>
        </div>
        
        <!-- AWAY COLUMN -->
        <div class="team-col away">
          <h3>AWAY TEAM</h3>
          <div class="form-group">
            <label>Coach Name</label>
            <input type="text" id="awayCoach" value="Pep Guardiola" />
          </div>
          <div class="form-group">
            <label>Formation</label>
            <select id="awayFormation">
              <option value="4-3-3">4-3-3</option>
              <option value="4-4-2">4-4-2</option>
              <option value="3-5-2">3-5-2</option>
              <option value="4-2-3-1">4-2-3-1</option>
              <option value="5-3-2">5-3-2</option>
            </select>
          </div>
          <div class="form-group">
            <label>Starting XI (Required for Cinematic)</label>
            <div id="awayPlayersContainer"></div>
          </div>
          <div class="form-group">
            <label>Substitutes (Number Name)</label>
            <textarea id="awaySubsText" class="subs">13 Steffen
14 Laporte
22 Mendy
25 Fernandinho</textarea>
          </div>
          <button class="btn btn-blue" onclick="showLineup('away')" id="awayLineupBtn">SHOW AWAY LINEUP</button>
        </div>
        
      </div>
    </div>

    <!-- GLOBAL ACTIONS -->
    <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;" />
    <div class="form-group" style="max-width: 300px; margin: 0 auto 20px;">
      <label style="text-align:center;">Global Font Family</label>
      <select id="globalFont" onchange="sendUpdate()">
        <option value="'Bebas Neue'">Bebas Neue (Default)</option>
        <option value="'Gilroy', sans-serif">Gilroy</option>
        <option value="'Roboto', sans-serif">Roboto</option>
        <option value="'Montserrat', sans-serif">Montserrat</option>
      </select>
    </div>
    <button class="btn btn-red" onclick="animateOut()">CLEAR SCREEN (PLAY OUT)</button>

  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('match') || 'default';
    document.getElementById('matchIdDisplay').innerText = `Controlling Match ID: ${matchId}`;

    function switchTab(tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    // Dynamic Player Inputs Generation
    const positions = ['GK','CB','LB','RB','CDM','CM','CAM','LW','RW','ST'];
    function generatePlayerRows(teamPrefix, defaults) {
      let html = '';
      for(let i=0; i<11; i++) {
        const d = defaults[i] || { num: '', name: '', pos: 'CM' };
        html += `
          <div class="player-row">
            <span style="font-weight:bold; width:20px; font-size:0.8rem; color:#888;">${i+1}</span>
            <input type="text" id="${teamPrefix}Num_${i}" placeholder="#" style="width:35px;" value="${d.num}" />
            <input type="text" id="${teamPrefix}Name_${i}" placeholder="Name" style="flex:1;" value="${d.name}" />
            <select id="${teamPrefix}Pos_${i}" style="width:65px;">
              ${positions.map(p => `<option value="${p}" ${p === d.pos ? 'selected' : ''}>${p}</option>`).join('')}
            </select>
            <input type="file" id="${teamPrefix}Photo_${i}" accept="image/*" style="width:80px; font-size:0.6rem; margin:0;" />
          </div>
        `;
      }
      document.getElementById(`${teamPrefix}PlayersContainer`).innerHTML = html;
    }

    // Pre-fill some defaults so it's not tedious to test
    const homeDefaults = [
      {num:'1', name:'De Gea', pos:'GK'}, {num:'29', name:'Wan-Bissaka', pos:'RB'},
      {num:'2', name:'Lindelof', pos:'CB'}, {num:'5', name:'Maguire', pos:'CB'},
      {num:'23', name:'Shaw', pos:'LB'}, {num:'39', name:'McTominay', pos:'CDM'},
      {num:'17', name:'Fred', pos:'CM'}, {num:'18', name:'Fernandes', pos:'CAM'},
      {num:'11', name:'Greenwood', pos:'RW'}, {num:'9', name:'Martial', pos:'ST'},
      {num:'10', name:'Rashford', pos:'LW'}
    ];
    const awayDefaults = [
      {num:'31', name:'Ederson', pos:'GK'}, {num:'2', name:'Walker', pos:'RB'},
      {num:'5', name:'Stones', pos:'CB'}, {num:'3', name:'Dias', pos:'CB'},
      {num:'27', name:'Cancelo', pos:'LB'}, {num:'16', name:'Rodri', pos:'CDM'},
      {num:'8', name:'Gundogan', pos:'CM'}, {num:'17', name:'De Bruyne', pos:'CAM'},
      {num:'26', name:'Mahrez', pos:'RW'}, {num:'9', name:'Jesus', pos:'ST'},
      {num:'7', name:'Sterling', pos:'LW'}
    ];

    generatePlayerRows('home', homeDefaults);
    generatePlayerRows('away', awayDefaults);


    // Image Handling
    function getBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Compress image via Canvas to prevent crashing node server with 11 massive photos
    function compressImage(file, maxWidth=250, maxHeight=250) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.8)); 
          };
        };
        reader.onerror = error => reject(error);
      });
    }

    async function sendActionToServer(payload) {
      payload.matchId = matchId;
      try {
        await fetch('/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error('Failed to send action:', err);
      }
    }

    async function sendUpdate() {
      const payload = {
        type: 'UPDATE_TEXT',
        homeName: document.getElementById('homeName').value,
        awayName: document.getElementById('awayName').value,
        leagueName: document.getElementById('leagueName').value,
        matchday: document.getElementById('matchday').value,
        kickoffTime: document.getElementById('kickoffTime').value,
        homeColor: document.getElementById('homeColor').value,
        awayColor: document.getElementById('awayColor').value,
        homeCoach: document.getElementById('homeCoach').value,
        awayCoach: document.getElementById('awayCoach').value,
        globalFont: document.getElementById('globalFont') ? document.getElementById('globalFont').value : null
      };

      const homeLogoFile = document.getElementById('homeLogo').files[0];
      if (homeLogoFile) payload.homeLogoData = await getBase64(homeLogoFile);
      
      const awayLogoFile = document.getElementById('awayLogo').files[0];
      if (awayLogoFile) payload.awayLogoData = await getBase64(awayLogoFile);
      
      await sendActionToServer(payload);
    }

    // Parse simple multiline text (used for Subs now)
    function parseSubsText(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      return lines.map(line => {
        const firstSpace = line.indexOf(' ');
        if (firstSpace > -1) {
          return { number: line.substring(0, firstSpace).trim(), name: line.substring(firstSpace + 1).trim() };
        }
        return { number: '-', name: line };
      });
    }

    async function showLineup(team) {
      const btn = document.getElementById(team + 'LineupBtn');
      const originalText = btn.innerText;
      btn.innerText = 'PROCESSING PHOTOS...';
      btn.disabled = true;

      try {
        // Collect 11 players
        const players = [];
        for(let i=0; i<11; i++) {
          const num = document.getElementById(`${team}Num_${i}`).value || '-';
          const name = document.getElementById(`${team}Name_${i}`).value || 'Player';
          const pos = document.getElementById(`${team}Pos_${i}`).value || 'CM';
          const fileInput = document.getElementById(`${team}Photo_${i}`);
          
          let photoData = null;
          if (fileInput.files && fileInput.files[0]) {
            photoData = await compressImage(fileInput.files[0]);
          }
          players.push({ number: num, name: name, position: pos, photo: photoData });
        }

        const subsText = document.getElementById(team + 'SubsText').value;
        const subs = parseSubsText(subsText);
        const formation = document.getElementById(team + 'Formation').value;
        
        await sendUpdate(); // Sync coach names/colors first
        
        await sendActionToServer({ 
          type: 'SHOW_LINEUP', 
          team: team, 
          formation: formation,
          players: players,
          subs: subs
        });
      } catch (err) {
        console.error("Error sending lineup:", err);
        alert("Failed to send lineup. Ensure images are not corrupted.");
      }

      btn.innerText = originalText;
      btn.disabled = false;
    }

    function animateIn() { sendActionToServer({ type: 'ANIMATE_IN' }); }
    function animateOut() { sendActionToServer({ type: 'ANIMATE_OUT' }); }

    window.onload = () => sendUpdate();
  </script>
</body>
</html>
