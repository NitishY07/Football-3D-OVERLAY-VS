<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Broadcast Graphic - Cinematic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&family=Roboto:wght@500;700;900&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --home-color: #ff2a5f;
      --away-color: #00e5ff;
      --font-titles: 'Bebas Neue', sans-serif;
      --font-info: 'Rajdhani', sans-serif;
      
      /* Dynamic Team Variables (Set via JS) */
      --lineup-primary: #ff2a5f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-info);
      background-color: transparent; 
      color: #ffffff;
      overflow: hidden; 
      width: 100vw; height: 100vh;
    }

    .broadcast-container {
      position: relative; width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      perspective: 2000px;
    }

    /* =========================================
       SCENE 1: VS GRAPHIC
       ========================================= */
    .scene-3d {
      position: absolute; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      transform-style: preserve-3d; opacity: 0; pointer-events: none;
    }
    .scene-3d.active { opacity: 1; pointer-events: auto; }
    
    .camera-rig {
      position: absolute; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      transform-style: preserve-3d; z-index: 10;
    }
    .scene-3d.active .camera-rig { animation: cameraDolly 15s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    .scene-3d.exit .camera-rig { animation: cameraDollyOut 1.2s cubic-bezier(0.5, 0, 0.2, 1) forwards; }

    .gfx-wrapper {
      position: relative; transform: scale(0.9) translateY(-50px); 
      width: 1400px; height: 800px; display: flex; justify-content: center; align-items: center;
      transform-style: preserve-3d;
    }

    .team-panel {
      position: absolute; width: 420px; height: 600px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; opacity: 0;
    }
    .team-panel::after { content: ''; position: absolute; inset: 0; border-radius: 20px; z-index: -2; transform: translateZ(-20px); background: #050508; }
    
    .home-panel { background: linear-gradient(135deg, rgba(20,20,30,0.9) 0%, rgba(5,5,10,0.95) 100%); transform: translateX(-1000px) translateZ(1000px) rotateY(90deg); }
    .home-panel::before { content: ''; position: absolute; inset: -4px; border-radius: 24px; z-index: -1; transform: translateZ(-10px); background: linear-gradient(135deg, var(--home-color), rgba(255,255,255,0.2), transparent); box-shadow: 0 0 40px var(--home-color); }
    .scene-3d.active .home-panel { animation: cinematicFlyInLeft 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .scene-3d.exit .home-panel { animation: cinematicFlyOutLeft 1.2s cubic-bezier(0.8, 0, 0.2, 1) forwards 0.2s; }

    .away-panel { background: linear-gradient(135deg, rgba(20,20,30,0.9) 0%, rgba(5,5,10,0.95) 100%); transform: translateX(1000px) translateZ(1000px) rotateY(-90deg); }
    .away-panel::before { content: ''; position: absolute; inset: -4px; border-radius: 24px; z-index: -1; transform: translateZ(-10px); background: linear-gradient(135deg, var(--away-color), rgba(255,255,255,0.2), transparent); box-shadow: 0 0 40px var(--away-color); }
    .scene-3d.active .away-panel { animation: cinematicFlyInRight 2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s; }
    .scene-3d.exit .away-panel { animation: cinematicFlyOutRight 1.2s cubic-bezier(0.8, 0, 0.2, 1) forwards 0.1s; }

    .team-logo-container { width: 360px; height: 360px; display: flex; justify-content: center; align-items: center; transform: translateZ(50px) scale(0) rotateY(180deg); opacity: 0; }
    .scene-3d.active .team-logo-container { animation: logoSpinIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.27) forwards 1s; }
    .scene-3d.exit .team-logo-container { animation: logoSpinOut 1s cubic-bezier(0.8, 0, 0.2, 1) forwards 0s; }
    .team-logo { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }

    .team-name { font-family: var(--font-titles); font-size: 5rem; letter-spacing: 2px; margin-top: 20px; text-align: center; transform: translateZ(80px) translateY(100px) rotateX(-90deg); opacity: 0; color: #fff; transform-origin: bottom; }
    .scene-3d.active .team-name { animation: textFlipUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.8s; }
    .scene-3d.exit .team-name { animation: textFlipDown 0.8s cubic-bezier(0.5, 0, 0.2, 1) forwards 0s; }
    .home-panel .team-name { text-shadow: 0 20px 20px rgba(0,0,0,0.9), 0 0 30px var(--home-color); }
    .away-panel .team-name { text-shadow: 0 20px 20px rgba(0,0,0,0.9), 0 0 30px var(--away-color); }

    .center-panel { position: absolute; width: 450px; display: flex; flex-direction: column; align-items: center; transform: translateY(-400px) scale(0.5); opacity: 0; transform-style: preserve-3d; }
    .scene-3d.active .center-panel { animation: centerDropIn 2s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.2s; }
    .scene-3d.exit .center-panel { animation: centerDropOut 1.2s cubic-bezier(0.5, 0, 0.2, 1) forwards 0.2s; }

    .match-info-glass { background: linear-gradient(135deg, rgba(20, 20, 30, 0.95) 0%, rgba(5, 5, 10, 1) 100%); border: 1px solid rgba(255,255,255,0.1); border-top: 4px solid #fff; padding: 15px 40px; border-radius: 10px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9); width: 100%; margin-bottom: 20px; transform-style: preserve-3d; }
    .league-name { font-size: 1.4rem; color: #aaa; letter-spacing: 5px; font-weight: 700; transform: translateZ(20px); }
    .match-day { font-family: var(--font-titles); font-size: 3rem; color: #fff; transform: translateZ(40px); letter-spacing: 2px; }

    .vs-badge { font-family: var(--font-titles); font-size: 8rem; line-height: 1; color: #fff; text-shadow: 0 30px 30px rgba(0,0,0,0.9); margin: 10px 0; position: relative; transform: translateZ(0px) scale(4); opacity: 0; }
    .scene-3d.active .vs-badge { animation: vsSlamIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards 2s; }
    .scene-3d.exit .vs-badge { animation: vsSlamOut 0.8s cubic-bezier(0.5, 0, 0.2, 1) forwards 0s; }

    @keyframes cameraDolly { 0% { transform: translateZ(600px); } 100% { transform: translateZ(0px); } }
    @keyframes cinematicFlyInLeft { 0% { transform: translateX(-1000px) translateZ(1000px) rotateY(90deg); opacity: 0; } 100% { transform: translateX(-500px) translateZ(50px) rotateY(15deg) rotateX(2deg); opacity: 1; } }
    @keyframes cinematicFlyInRight { 0% { transform: translateX(1000px) translateZ(1000px) rotateY(-90deg); opacity: 0; } 100% { transform: translateX(500px) translateZ(50px) rotateY(-15deg) rotateX(2deg); opacity: 1; } }
    @keyframes logoSpinIn { 0% { transform: translateZ(50px) scale(0) rotateY(180deg); opacity: 0; } 100% { transform: translateZ(140px) scale(1) rotateY(0deg); opacity: 1; } }
    @keyframes textFlipUp { 0% { transform: translateZ(80px) translateY(100px) rotateX(-90deg); opacity: 0; } 100% { transform: translateZ(100px) translateY(0) rotateX(0deg); opacity: 1; } }
    @keyframes centerDropIn { 0% { transform: translateY(-600px) translateZ(0px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) translateZ(150px) scale(1); opacity: 1; } }
    @keyframes vsSlamIn { 0% { transform: translateZ(400px) scale(4); opacity: 0; } 100% { transform: translateZ(120px) scale(1); opacity: 1; } }
    @keyframes cameraDollyOut { 0% { transform: translateZ(0px); } 100% { transform: translateZ(600px); opacity: 0;} }
    @keyframes cinematicFlyOutLeft { 0% { transform: translateX(-500px) translateZ(50px) rotateY(15deg) rotateX(2deg); opacity: 1; } 100% { transform: translateX(-1000px) translateZ(1000px) rotateY(90deg); opacity: 0; } }
    @keyframes cinematicFlyOutRight { 0% { transform: translateX(500px) translateZ(50px) rotateY(-15deg) rotateX(2deg); opacity: 1; } 100% { transform: translateX(1000px) translateZ(1000px) rotateY(-90deg); opacity: 0; } }
    @keyframes logoSpinOut { 0% { transform: translateZ(140px) scale(1) rotateY(0deg); opacity: 1; } 100% { transform: translateZ(50px) scale(0) rotateY(180deg); opacity: 0; } }
    @keyframes textFlipDown { 0% { transform: translateZ(100px) translateY(0) rotateX(0deg); opacity: 1; } 100% { transform: translateZ(80px) translateY(100px) rotateX(-90deg); opacity: 0; } }
    @keyframes centerDropOut { 0% { transform: translateY(0) translateZ(150px) scale(1); opacity: 1; } 100% { transform: translateY(-600px) translateZ(0px) scale(0.5); opacity: 0; } }
    @keyframes vsSlamOut { 0% { transform: translateZ(120px) scale(1); opacity: 1; } 100% { transform: translateZ(400px) scale(4); opacity: 0; } }


    /* =========================================
       SCENE 2: CINEMATIC LINEUPS
       ========================================= */
    .lineup-scene-cinematic {
      position: absolute; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    .lineup-scene-cinematic.active { opacity: 1; pointer-events: auto; }

    /* PHASE 1: PLAYER INTROS */
    #introPhaseContainer {
      position: absolute; width: 100vw; height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50;
      background: radial-gradient(circle at center, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.95) 100%);
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    #introPhaseContainer.active { opacity: 1; }
    
    .intro-header {
      position: absolute; top: 50px; left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      animation: dropDown 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
    }
    .intro-header-logo { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); margin-bottom: 10px;}
    .intro-header-team { font-family: var(--font-titles); font-size: 5rem; color: #fff; line-height: 1; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); text-transform: uppercase;}
    .intro-header-title { font-size: 1.8rem; color: var(--lineup-primary); font-weight: bold; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 2px 5px #000;}
    
    @keyframes dropDown {
      0% { transform: translateY(-100px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    #playerIntrosContainer {
      position: absolute; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 50;
    }
    
    .player-intro-card {
      width: 320px; height: 450px;
      background: linear-gradient(135deg, var(--lineup-primary) 0%, rgba(10,15,25,0.98) 100%);
      border-radius: 20px; border: 4px solid rgba(255,255,255,0.3);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 50px var(--lineup-primary);
      opacity: 0; pointer-events: none;
    }
    .player-intro-card.run-anim {
      animation: introSequence 3s cubic-bezier(0.2, 1, 0.3, 1) forwards;
    }
    
    @keyframes introSequence {
      0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
      10% { transform: scale(1.1) rotateY(0deg); opacity: 1; }
      90% { transform: scale(1) rotateY(0deg); opacity: 1; }
      100% { transform: scale(1.5) rotateY(-90deg); opacity: 0; }
    }

    .intro-photo { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 6px solid #fff; margin-bottom: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); background: rgba(0,0,0,0.5); }
    .intro-number { font-family: var(--font-titles); font-size: 5rem; color: #fff; line-height: 0.9; text-shadow: 0 5px 20px rgba(0,0,0,0.8); }
    .intro-name { font-size: 2rem; color: #fff; font-weight: bold; text-transform: uppercase; margin: 5px 0; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .intro-pos { background: #fff; color: var(--lineup-primary); padding: 5px 25px; border-radius: 20px; font-weight: bold; font-size: 1.4rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }


    /* PHASE 2: FULL PITCH (Fades in after intros) */
    .pitch-phase {
      position: absolute; width: 100vw; height: 100vh;
      display: flex; opacity: 0; transition: opacity 1s ease;
      background: rgba(10, 15, 25, 0.85);
      overflow: hidden;
    }
    .pitch-phase.active { opacity: 1; }

    /* Left Col: Info */
    .col-left { 
      flex: 0 0 300px; padding: 40px; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; gap: 40px; 
      background: linear-gradient(to right, rgba(0,0,0,0.6), transparent);
    }
    .logo-box { width: 200px; height: 200px; display: flex; justify-content: center; align-items: center; }
    .lineup-logo { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); }
    .coach-box { text-align: center; }
    .coach-label { font-size: 1.5rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
    .coach-name { font-size: 3rem; color: #fff; font-family: var(--font-titles); letter-spacing: 1px; margin-top: 5px;}

    /* Center Col: 3D Pitch */
    .col-center { 
      flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
      perspective: 1200px; overflow: visible;
    }
    .pitch-3d { 
      width: 800px; height: 950px; background: #1a422a; 
      border: 4px solid var(--lineup-primary); 
      transform: scale(0.9);
      box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 80px rgba(0,0,0,0.6);
      position: relative; transform-style: preserve-3d;
    }
    
    /* Pitch Markings */
    .pitch-lines { position: absolute; inset: 20px; border: 2px solid rgba(255,255,255,0.4); pointer-events: none; }
    .pitch-lines::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.4); }
    .pitch-lines::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; }
    .penalty-box-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 350px; height: 120px; border: 2px solid rgba(255,255,255,0.4); border-top: none; }
    .penalty-box-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 350px; height: 120px; border: 2px solid rgba(255,255,255,0.4); border-bottom: none; }

    /* Player Nodes on Pitch */
    .pitch-player {
      position: absolute; width: 120px; height: 140px;
      margin-left: -60px; margin-top: -70px;
      display: flex; flex-direction: column; align-items: center;
      transform: none; /* Counter pitch rotation so they stand up */
      opacity: 0; transform-origin: bottom center;
    }
    .pitch-player.active {
      animation: dropToPitch 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.27) forwards;
    }
    @keyframes dropToPitch {
      0% { transform: translateY(-300px) scale(2); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    
    .pitch-photo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid #fff; background: rgba(0,0,0,0.5); box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
    .pitch-name { color: #fff; font-size: 1.6rem; font-weight: bold; text-shadow: 1px 1px 3px #000, 0 0 10px #000, 0 0 15px #000; margin-top: 8px; white-space: nowrap; text-transform: uppercase; }
    .pitch-pos { font-size: 1.1rem; background: var(--lineup-primary); color: #fff; padding: 4px 12px; border-radius: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); margin-top: -12px; z-index: 2;}
    .pitch-num { position: absolute; top: -10px; right: -10px; background: #fff; color: #000; font-family: var(--font-titles); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 3;}


    /* Right Col: Subs */
    .col-right { 
      flex: 0 0 350px; padding: 40px 40px 40px 0; 
      display: flex; flex-direction: column; 
      background: linear-gradient(to left, rgba(0,0,0,0.6), transparent);
    }
    .subs-header { font-size: 2rem; color: #fff; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase;}
    .subs-container { display: flex; flex-direction: column; gap: 10px; }
    
    .sub-item { 
      display: flex; align-items: center; background: rgba(20, 25, 35, 0.8); 
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden;
      opacity: 0; transform: translateX(50px);
    }
    .pitch-phase.active .sub-item { animation: slideInRight 0.5s ease forwards; }
    @keyframes slideInRight { 100% { opacity: 1; transform: translateX(0); } }

    .sub-number { background: var(--lineup-primary); color: #fff; font-size: 2rem; font-family: var(--font-titles); width: 60px; padding: 10px 0; text-align: center; }
    .sub-name { color: #fff; padding-left: 15px; font-weight: bold; font-size: 1.6rem; text-transform: uppercase; }

    /* =========================================
       SCENE 3: PREMIER LEAGUE LINEUPS
       ========================================= */
    .lineup-scene-pl {
      position: absolute; width: 100%; height: 100%;
      display: flex; opacity: 0; pointer-events: none; transition: opacity 0.5s;
      background: #f0f0f0; font-family: 'Roboto', sans-serif;
    }
    .lineup-scene-pl.active { opacity: 1; pointer-events: auto; }

    .pl-pitch-area {
      flex: 1; display: flex; justify-content: center; align-items: center;
      position: relative; overflow: hidden; perspective: 1200px;
    }

    .pl-pitch-container {
      width: 1100px; height: 800px;
      background: #e0e0e0; border: 4px solid #fff; border-radius: 20px;
      position: relative; margin-top: 50px; box-shadow: 0 50px 100px rgba(0,0,0,0.1);
    }
    
    .pl-line-center { position: absolute; width: 100%; height: 4px; background: #fff; top: 50%; left: 0; transform: translateY(-50%); }
    .pl-circle-center { position: absolute; width: 200px; height: 200px; border: 4px solid #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .pl-box-top { position: absolute; width: 400px; height: 150px; border: 4px solid #fff; border-top: none; top: 0; left: 50%; transform: translateX(-50%); }
    .pl-box-bottom { position: absolute; width: 400px; height: 150px; border: 4px solid #fff; border-bottom: none; bottom: 0; left: 50%; transform: translateX(-50%); }

    #plPlayerNodes { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }

    .pl-player-node {
      position: absolute; transform: translate(-50%, -50%) scale(0); 
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; flex-direction: column; align-items: center; opacity: 0;
      z-index: 10;
    }
    .pl-player-node.active { opacity: 1; }
    
    .pl-player-node.center-focus {
       transform: translate(-50%, -50%) scale(1.6);
       z-index: 100; opacity: 1;
    }
    .pl-player-node.placed {
       transform: translate(-50%, -50%) scale(1);
       opacity: 1;
    }
    
    .pl-card { 
      width: 140px; height: 180px; background: transparent;
      display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      position: relative; transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .pl-card-num {
      position: absolute; top: 10px; left: -10px;
      width: 40px; height: 40px; background: #ccff00; color: #000;
      font-size: 2rem; font-weight: 900; font-family: var(--font-titles);
      display: flex; justify-content: center; align-items: center;
      z-index: 5; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); transition: all 0.5s;
    }
    .pl-card-photo {
      width: 100%; height: 140px; object-fit: contain; z-index: 1; transition: all 0.5s;
    }
    .pl-card-name {
      width: 100%; padding: 8px 0; background: #000; color: #fff;
      font-size: 1.2rem; font-weight: bold; text-align: center; text-transform: uppercase;
      z-index: 2; margin-top: -10px; font-family: var(--font-titles); letter-spacing: 1px; transition: all 0.5s; white-space: nowrap;
    }

    #plPlayerNodes.focus-mode .pl-player-node { opacity: 0.3; }
    #plPlayerNodes.focus-mode .pl-player-node.focus { opacity: 1; z-index: 100; transform: translate(-50%, -50%) scale(1.5); }
    
    .pl-player-node.focus .pl-card { width: 160px; height: 230px; }
    
    .pl-player-node.phase3 .pl-card-num { font-size: 1.8rem; width: 35px; height: 35px; top: 15px; left: -5px;}
    .pl-player-node.phase3 .pl-card-name { font-size: 1rem; padding: 6px 0; margin-top: -5px;}
    .pl-player-node.phase3 .pl-card-photo { height: 120px; }

    .pl-sidebar {
      width: 400px; height: 100%; background: transparent;
      position: absolute; right: 0; top: 0;
      display: flex; flex-direction: column; align-items: flex-end; padding: 80px 60px;
      pointer-events: none; transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
      transform: translateX(100%); z-index: 100;
    }
    .pl-sidebar.active { transform: translateX(0); }

    .pl-subs-container { width: 100%; opacity: 0; transition: opacity 0.5s; display: flex; flex-direction: column; align-items: flex-end; }
    .pl-subs-container.active { opacity: 1; }
    .pl-subs-header { font-size: 3.5rem; color: #ff2a5f; font-weight: 900; margin-bottom: 20px; font-family: var(--font-titles); text-shadow: 0 4px 10px rgba(0,0,0,0.5);}
    .pl-sub-item { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .pl-sub-name { font-size: 2.2rem; color: #fff; font-weight: 500; font-family: var(--font-titles); text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,0.8);}

    /* GROUP AND TEAM TEXT */
    .pl-group-text {
      position: absolute; top: 10%; left: 50%; transform: translateX(-50%) translateY(-20px);
      font-family: var(--font-titles); font-size: 5rem; color: #fff; font-weight: 900;
      text-transform: uppercase; letter-spacing: 5px;
      opacity: 0; transition: all 0.5s ease; z-index: 200;
      text-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .pl-group-text.active { opacity: 1; transform: translateX(-50%) translateY(0); }

    .pl-top-left-team {
      position: absolute; top: 60px; left: 80px; 
      color: #ccff00; font-family: var(--font-titles); font-size: 4rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.8);
      opacity: 0; transform: translateX(-50px); transition: all 0.8s ease; z-index: 100;
    }
    .pl-top-left-team.active { opacity: 1; transform: translateX(0); }

    /* PREMIER LEAGUE INTRO SCREEN */
    .pl-intro-screen {
      position: absolute; width: 100%; height: 100%; top: 0; left: 0;
      display: flex; opacity: 0; pointer-events: none; transition: opacity 0.5s;
      z-index: 500; overflow: hidden;
    }
    .pl-intro-screen.active { opacity: 1; pointer-events: auto; }
    .pl-intro-left {
      flex: 0 0 35%; background: #fff; position: relative;
      display: flex; justify-content: center; align-items: flex-end;
      transform: translateX(-100%); transition: transform 1s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .pl-intro-screen.active .pl-intro-left { transform: translateX(0); }
    
    .pl-intro-coach-img { width: 120%; height: auto; max-height: 90%; object-fit: contain; transform: scale(1); transition: transform 4s linear; }
    .pl-intro-screen.active .pl-intro-coach-img { transform: scale(1.05); }

    .pl-intro-coach-name {
      position: absolute; bottom: 40px; left: 40px; 
      background: rgba(0,0,0,0.8); color: #fff; text-transform: uppercase;
      font-family: var(--font-titles); font-size: 3rem; font-weight: bold;
      padding: 10px 20px; border-radius: 8px;
      opacity: 0; transform: translateY(20px); transition: all 1s 1s ease;
    }
    .pl-intro-screen.active .pl-intro-coach-name.show { opacity: 1; transform: translateY(0); }
    
    .pl-intro-logo { width: 80%; max-height: 80%; object-fit: contain; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); opacity: 0; transition: all 1s ease;}
    .pl-intro-screen.active .pl-intro-logo { transform: translate(-50%, -50%) scale(1); }
    
    .pl-intro-right {
      flex: 1; background: var(--lineup-primary); position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border-top-left-radius: 40px; border-bottom-left-radius: 40px;
      transform: translateX(100%); transition: transform 1s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .pl-intro-screen.active .pl-intro-right { transform: translateX(0); }
    
    .pl-intro-bg-text {
      position: absolute; color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.2);
      font-size: 15rem; font-family: var(--font-titles); font-weight: 900;
      line-height: 0.9; text-transform: uppercase; white-space: pre-line;
      text-align: center;
      transform: translateY(0); transition: transform 6s linear;
    }
    .pl-intro-screen.active .pl-intro-bg-text { transform: translateY(-10%); }
    
    .pl-intro-team-name {
      color: #fff; font-size: 8rem; font-weight: 900; font-family: var(--font-titles);
      text-transform: uppercase; text-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 2;
      opacity: 0; transform: scale(0.9); transition: all 1s 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    }
    .pl-intro-screen.active .pl-intro-team-name { opacity: 1; transform: scale(1); }

  </style>
</head>
<body>
  <div class="broadcast-container">
    
    <!-- =========================================
         SCENE 1: VS GRAPHIC 
         ========================================= -->
    <div class="scene-3d" id="scene3d">
      <div class="camera-rig">
        <div class="gfx-wrapper">
          <div class="team-panel home-panel">
            <div class="team-logo-container"><img src="home_logo.jpg" id="homeLogoImg" class="team-logo" /></div>
            <div class="team-name" id="homeNameText">RED DEVILS</div>
          </div>
          <div class="center-panel">
            <div class="match-info-glass">
              <div class="league-name" id="leagueNameText">PREMIER CHAMPIONSHIP</div>
              <div class="match-day" id="matchdayText">MATCHDAY 24</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="match-info-glass" style="padding: 10px 30px">
              <div class="league-name" style="font-size: 1rem">KICK-OFF</div>
              <div class="match-day" style="font-size: 2rem" id="kickoffTimeText">20:45 CET</div>
            </div>
          </div>
          <div class="team-panel away-panel">
            <div class="team-logo-container"><img src="away_logo.jpg" id="awayLogoImg" class="team-logo" /></div>
            <div class="team-name" id="awayNameText">BLUE EAGLES</div>
          </div>
        </div>
      </div>
    </div>

    <!-- =========================================
         SCENE 2: CINEMATIC LINEUPS
         ========================================= -->
    <div class="lineup-scene-cinematic" id="lineupScene">
      
      <!-- Phase 1: Rapid Fire Player Intros -->
      <div id="introPhaseContainer">
        <div class="intro-header">
          <img src="" id="introPhaseLogo" class="intro-header-logo">
          <div id="introPhaseTeam" class="intro-header-team">TEAM NAME</div>
          <div class="intro-header-title">PLAYING XI</div>
        </div>
        <div id="playerIntrosContainer"></div>
      </div>
      
      <!-- Phase 2: Full Pitch Overview -->
      <div class="pitch-phase" id="pitchPhase">
        <!-- Left Info -->
        <div class="col-left">
          <div class="logo-box"><img src="" id="lineupLogoImg" class="lineup-logo"></div>
          <div class="coach-box">
            <div class="coach-label">COACH</div>
            <div class="coach-name" id="lineupCoachText">MANAV ROY</div>
          </div>
        </div>
        
        <!-- Center Pitch -->
        <div class="col-center">
          <div class="pitch-3d">
            <div class="pitch-lines">
              <div class="penalty-box-top"></div>
              <div class="penalty-box-bottom"></div>
            </div>
            <div id="playerNodesContainer"></div>
          </div>
        </div>
        
        <!-- Right Subs -->
        <div class="col-right">
          <div class="subs-header">SUBSTITUTES</div>
          <div class="subs-container" id="subsContainer"></div>
        </div>
      </div>

    </div>

    <!-- =========================================
         SCENE 3: PREMIER LEAGUE LINEUPS
         ========================================= -->
    <div class="pl-intro-screen" id="plIntroScreen">
      <div class="pl-intro-left">
        <img src="" id="plIntroLogo" class="pl-intro-logo">
        <img src="" id="plIntroCoach" class="pl-intro-coach-img">
        <div id="plIntroCoachName" class="pl-intro-coach-name"></div>
      </div>
      <div class="pl-intro-right">
        <div id="plIntroBgText" class="pl-intro-bg-text"></div>
        <div id="plIntroTeamName" class="pl-intro-team-name"></div>
      </div>
    </div>

    <div class="lineup-scene-pl" id="lineupScenePL">
      <div id="plGroupText" class="pl-group-text"></div>
      <div id="plTopLeftTeam" class="pl-top-left-team"></div>
      
      <div class="pl-pitch-area">
        <div class="pl-pitch-container">
          <div class="pl-line-center"></div>
          <div class="pl-circle-center"></div>
          <div class="pl-box-top"></div>
          <div class="pl-box-bottom"></div>
          <div id="plPlayerNodes"></div>
        </div>
      </div>
      <div class="pl-sidebar" id="plSidebar">
        <div id="plSubsContainer" class="pl-subs-container"></div>
      </div>
    </div>

  </div>

  <script>
    const appState = {
      leagueName: 'FOOTBALL CHAMPIONSHIP 2024',
      homeName: 'HOME TEAM', homeColor: '#ff2a5f', homeLogo: 'home_logo.jpg', homeCoach: '',
      awayName: 'AWAY TEAM', awayColor: '#00e5ff', awayLogo: 'away_logo.jpg', awayCoach: ''
    };

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get('match') || 'default';
    const eventSource = new EventSource(`/events?match=${matchId}`);
    
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      
      if (data.type === 'UPDATE_TEXT') {
        if(data.homeName) { document.getElementById('homeNameText').innerText = data.homeName; appState.homeName = data.homeName; }
        if(data.awayName) { document.getElementById('awayNameText').innerText = data.awayName; appState.awayName = data.awayName; }
        if(data.homeShortName) appState.homeShortName = data.homeShortName;
        if(data.awayShortName) appState.awayShortName = data.awayShortName;
        if(data.leagueName) { document.getElementById('leagueNameText').innerText = data.leagueName; appState.leagueName = data.leagueName; }
        if(data.matchday) document.getElementById('matchdayText').innerText = data.matchday;
        if(data.kickoffTime) document.getElementById('kickoffTimeText').innerText = data.kickoffTime;
        if(data.homeCoach) appState.homeCoach = data.homeCoach;
        if(data.awayCoach) appState.awayCoach = data.awayCoach;
        if(data.homeColor) { document.documentElement.style.setProperty('--home-color', data.homeColor); appState.homeColor = data.homeColor; }
        if(data.awayColor) { document.documentElement.style.setProperty('--away-color', data.awayColor); appState.awayColor = data.awayColor; }
        if(data.homeLogoData) { document.getElementById('homeLogoImg').src = data.homeLogoData; appState.homeLogo = data.homeLogoData; }
        if(data.awayLogoData) { document.getElementById('awayLogoImg').src = data.awayLogoData; appState.awayLogo = data.awayLogoData; }
        if(data.homeCoachPhoto) appState.homeCoachPhoto = data.homeCoachPhoto;
        if(data.awayCoachPhoto) appState.awayCoachPhoto = data.awayCoachPhoto;
        if(data.globalFont) {
          if (data.globalFont.includes('Bebas Neue')) {
            document.documentElement.style.setProperty('--font-titles', "'Bebas Neue', sans-serif");
            document.documentElement.style.setProperty('--font-info', "'Rajdhani', sans-serif");
          } else {
            document.documentElement.style.setProperty('--font-titles', data.globalFont);
            document.documentElement.style.setProperty('--font-info', data.globalFont);
          }
        }
      }
      
      if (data.type === 'ANIMATE_IN') {
        hideScene('lineupScene');
        showScene('scene3d');
      }
      
      if (data.type === 'ANIMATE_OUT') {
        hideScene('scene3d');
        hideScene('lineupScene');
        hideScene('lineupScenePL');
        document.getElementById('pitchPhase').classList.remove('active');
        document.getElementById('playerIntrosContainer').innerHTML = '';
        document.getElementById('plPlayerNodes').innerHTML = '';
        document.getElementById('plSidebar').classList.remove('active');
        document.getElementById('plIntroScreen').classList.remove('active');
      }

      if (data.type === 'SHOW_LINEUP') {
        hideScene('scene3d'); // Hide VS
        if (data.theme === 'pl') {
          playPLLineup(data.team, data.formation, data.players, data.subs);
        } else {
          playCinematicLineup(data.team, data.formation, data.players, data.subs);
        }
      }
    };

    function showScene(id) {
      const scene = document.getElementById(id);
      scene.classList.remove('active');
      void scene.offsetWidth; 
      scene.classList.add('active');
    }

    function hideScene(id) {
      const scene = document.getElementById(id);
      scene.classList.remove('active');
    }

    async function playPLLineup(team, formation, players, subs) {
      // Set Theme Colors
      const primaryColor = team === 'home' ? appState.homeColor : appState.awayColor;
      document.documentElement.style.setProperty('--lineup-primary', primaryColor);
      
      const plScene = document.getElementById('lineupScenePL');
      const plNodes = document.getElementById('plPlayerNodes');
      const plSidebar = document.getElementById('plSidebar');
      const plSubsContainer = document.getElementById('plSubsContainer');

      // Reset DOM
      hideScene('lineupScene');
      plScene.classList.remove('active');
      plNodes.innerHTML = '';
      plSubsContainer.innerHTML = '';
      plSubsContainer.classList.remove('active');
      plSidebar.classList.remove('active');
      document.getElementById('plIntroScreen').classList.remove('active');

      const plGroupText = document.getElementById('plGroupText');
      const plTopLeftTeam = document.getElementById('plTopLeftTeam');
      plGroupText.classList.remove('active');
      plTopLeftTeam.classList.remove('active');

      // Group Players into 4 distinct groups: GK, DEF, MID, FWD
      const lines = formation.split('-').map(Number);
      
      const groupData = [
        { label: 'GK', players: [] },
        { label: 'DEFENDER', players: [] },
        { label: 'MIDFIELDER', players: [] },
        { label: 'FORWARD', players: [] }
      ];

      let playerIndex = 0;
      const rows = [1, ...lines];
      const rowY = rows.length === 4 ? [92, 70, 45, 20] : rows.length === 5 ? [92, 72, 54, 36, 18] : [92, 60, 30];

      rows.forEach((numPlayersInRow, rIndex) => {
        const yPos = rowY[rIndex];
        
        let gIndex = 0;
        if (rIndex === 0) gIndex = 0;
        else if (rIndex === 1) gIndex = 1;
        else if (rIndex === rows.length - 1) gIndex = 3;
        else gIndex = 2;

        for (let i = 0; i < numPlayersInRow; i++) {
          if (playerIndex >= players.length) break;
          const p = players[playerIndex];
          const gap = 100 / (numPlayersInRow + 1);
          const xPos = gap * (i + 1);
          
          groupData[gIndex].players.push({ data: p, pitchX: xPos, pitchY: yPos });
          playerIndex++;
        }
      });

      // Prepare DOM Nodes for all players
      groupData.forEach(g => {
        const count = g.players.length;
        const spacing = 16; 
        const startLeft = 50 - ((count - 1) * spacing / 2);

        g.nodes = [];
        g.players.forEach((p, idx) => {
          const node = document.createElement('div');
          node.className = 'pl-player-node';
          const centerX = startLeft + (idx * spacing);
          
          node.style.left = `${centerX}%`;
          node.style.top = `50%`;

          const defaultAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23222"/><circle cx="50" cy="35" r="25" fill="%23555"/><path d="M10 100 Q 50 50 90 100" fill="%23555"/></svg>';
          const photoSrc = p.data.photo || defaultAvatar;

          node.innerHTML = `
            <div class="pl-card">
              <img src="${photoSrc}" class="pl-card-photo">
              <div class="pl-card-num">${p.data.number}</div>
              <div class="pl-card-name">${p.data.name}</div>
            </div>
          `;
          plNodes.appendChild(node);
          g.nodes.push({ element: node, pitchX: p.pitchX, pitchY: p.pitchY, centerX: centerX });
        });
      });

      // Prepare Subs
      if (subs && subs.length > 0) {
        let subsHtml = '<div class="pl-subs-header">SUBSTITUTES</div>';
        subs.forEach(s => {
          subsHtml += `
            <div class="pl-sub-item">
              <div class="pl-sub-name">${s.name}</div>
            </div>
          `;
        });
        plSubsContainer.innerHTML = subsHtml;
      }

      const introScreen = document.getElementById('plIntroScreen');
      const introLogo = document.getElementById('plIntroLogo');
      const introCoach = document.getElementById('plIntroCoach');
      const introCoachName = document.getElementById('plIntroCoachName');
      const introBgText = document.getElementById('plIntroBgText');
      const introTeamName = document.getElementById('plIntroTeamName');

      // Setup Intro Screen
      const teamNameStr = team === 'home' ? appState.homeName : appState.awayName;
      const shortNameStr = team === 'home' ? (appState.homeShortName || teamNameStr.substring(0,3)) : (appState.awayShortName || teamNameStr.substring(0,3));
      const coachPhotoData = team === 'home' ? appState.homeCoachPhoto : appState.awayCoachPhoto;
      const coachNameStr = team === 'home' ? appState.homeCoach : appState.awayCoach;
      
      introTeamName.innerText = teamNameStr;
      plTopLeftTeam.innerText = teamNameStr;
      
      let bgTextStr = '';
      for(let i=0; i<6; i++) {
        bgTextStr += shortNameStr + ' ' + shortNameStr + ' ' + shortNameStr + '\n';
      }
      introBgText.innerText = bgTextStr;

      if (coachPhotoData) {
        introCoach.src = coachPhotoData;
        introCoach.style.opacity = 1;
        introLogo.style.opacity = 0;
        if (coachNameStr) {
          introCoachName.innerText = coachNameStr;
          introCoachName.classList.add('show');
        } else {
          introCoachName.classList.remove('show');
        }
      } else {
        introCoach.style.opacity = 0;
        introCoachName.classList.remove('show');
        introLogo.src = team === 'home' ? appState.homeLogo : appState.awayLogo;
        introLogo.style.opacity = 1;
      }

      // Show Phase 0 Intro Screen
      introScreen.classList.add('active');

      await new Promise(r => setTimeout(r, 4000));
      introScreen.classList.remove('active');

      await new Promise(r => setTimeout(r, 500));
      
      // Activate Scene (Pitch fades in)
      showScene('lineupScenePL');
      await new Promise(r => setTimeout(r, 500));
      
      // Animate Groups
      for (let i = 0; i < groupData.length; i++) {
        const g = groupData[i];
        if (g.nodes.length === 0) continue;
        
        plGroupText.innerText = g.label;
        plGroupText.classList.add('active');
        
        // Pop up in center
        g.nodes.forEach(n => {
          n.element.classList.add('center-focus');
        });
        
        await new Promise(r => setTimeout(r, 2000));
        
        // Move to pitch
        g.nodes.forEach(n => {
          n.element.classList.remove('center-focus');
          n.element.classList.add('placed');
          n.element.style.left = `${n.pitchX}%`;
          n.element.style.top = `${n.pitchY}%`;
        });
        
        plGroupText.classList.remove('active');
        
        await new Promise(r => setTimeout(r, 1000));
      }

      // Phase 3: Show Top Left Team Name and Sidebar
      plTopLeftTeam.classList.add('active');
      document.querySelectorAll('.pl-player-node').forEach(node => {
        node.classList.add('phase3');
      });

      plSidebar.classList.add('active');
      plSubsContainer.classList.add('active');

    }

    async function playCinematicLineup(team, formation, players, subs) {
      // Set Theme Colors
      const primaryColor = team === 'home' ? appState.homeColor : appState.awayColor;
      document.documentElement.style.setProperty('--lineup-primary', primaryColor);
      
      document.getElementById('lineupLogoImg').src = team === 'home' ? appState.homeLogo : appState.awayLogo;
      document.getElementById('lineupCoachText').innerText = team === 'home' ? (appState.homeCoach || 'NOT SET') : (appState.awayCoach || 'NOT SET');

      // Reset DOM
      const pitchPhase = document.getElementById('pitchPhase');
      const introPhase = document.getElementById('introPhaseContainer');
      const introContainer = document.getElementById('playerIntrosContainer');
      const pitchContainer = document.getElementById('playerNodesContainer');
      const subsContainer = document.getElementById('subsContainer');
      
      pitchPhase.classList.remove('active');
      introPhase.classList.remove('active');
      introContainer.innerHTML = '';
      pitchContainer.innerHTML = '';
      subsContainer.innerHTML = '';
      
      showScene('lineupScene');
      introPhase.classList.add('active');
      document.getElementById('introPhaseLogo').src = team === 'home' ? appState.homeLogo : appState.awayLogo;
      document.getElementById('introPhaseTeam').innerText = team === 'home' ? appState.homeName : appState.awayName;

      // 1. Generate Intro Cards (Grouped by formation rows, in reverse)
      const defaultAvatar = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='; // transparent pixel fallback if needed, but css handles background

      // Prep Pitch Nodes (Hidden initially)
      const lines = formation.split('-').map(Number);
      const rows = [1, ...lines]; // Row 0 = GK
      
      const rowGroups = [];
      let pIdx = 0;
      rows.forEach(count => {
        rowGroups.push(players.slice(pIdx, pIdx + count));
        pIdx += count;
      });
      
      // We want to animate in reverse order (Forwards first down to GK)
      const animateGroups = rowGroups.reverse();
      const groupDuration = 3000;

      animateGroups.forEach((group, groupIndex) => {
        const groupContainer = document.createElement('div');
        groupContainer.style.position = 'absolute';
        groupContainer.style.width = '100%';
        groupContainer.style.height = '100%';
        groupContainer.style.display = 'flex';
        groupContainer.style.justifyContent = 'center';
        groupContainer.style.alignItems = 'center';
        groupContainer.style.gap = '40px';
        
        group.forEach(p => {
          const card = document.createElement('div');
          card.className = 'player-intro-card';
          card.style.animationDelay = `${groupIndex * (groupDuration / 1000)}s`;
          
          const photoSrc = p.photo || defaultAvatar;
          card.innerHTML = `
            <img src="${photoSrc}" class="intro-photo" style="${!p.photo ? 'opacity:0;' : ''}">
            <div class="intro-pos">${p.position}</div>
            <div class="intro-name">${p.name}</div>
            <div class="intro-number">${p.number}</div>
          `;
          groupContainer.appendChild(card);
          
          setTimeout(() => card.classList.add('run-anim'), 10);
        });
        
        introContainer.appendChild(groupContainer);
      });

      // Total Intro time = num groups * 3s
      const introDurationMs = animateGroups.length * groupDuration + 500;
      const rowY = rows.length === 4 ? [92, 70, 45, 20] : rows.length === 5 ? [92, 72, 54, 36, 18] : [92, 60, 30]; 

      let playerIndex = 0;
      rows.forEach((numPlayersInRow, rIndex) => {
        const yPos = rowY[rIndex];
        for (let i = 0; i < numPlayersInRow; i++) {
          if (playerIndex >= players.length) break;
          const p = players[playerIndex];
          const gap = 100 / (numPlayersInRow + 1);
          const xPos = gap * (i + 1);

          const node = document.createElement('div');
          node.className = 'pitch-player';
          node.style.left = `${xPos}%`;
          node.style.top = `${yPos}%`;
          // Stagger the drop animation
          node.style.animationDelay = `${(playerIndex * 0.1)}s`;

          const photoSrc = p.photo || defaultAvatar;

          node.innerHTML = `
            <div class="pitch-num">${p.number}</div>
            <img src="${photoSrc}" class="pitch-photo" style="${!p.photo ? 'opacity:0;' : ''}">
            <div class="pitch-pos">${p.position}</div>
            <div class="pitch-name">${p.name}</div>
          `;
          
          pitchContainer.appendChild(node);
          playerIndex++;
        }
      });

      // Prep Subs
      if (subs && subs.length > 0) {
        subs.forEach((s, idx) => {
          subsContainer.innerHTML += `
            <div class="sub-item" style="animation-delay: ${0.2 + (idx * 0.1)}s">
              <div class="sub-number">${s.number}</div>
              <div class="sub-name">${s.name}</div>
            </div>
          `;
        });
      }

      // 2. Trigger Phase 2 (Pitch Fade In & Fly In)
      setTimeout(() => {
        introPhase.classList.remove('active'); // fade out intro bg
        setTimeout(() => introContainer.innerHTML = '', 500); // clear intros after fade
        pitchPhase.classList.add('active'); // fade in pitch & subs
        
        // Trigger player drops
        document.querySelectorAll('.pitch-player').forEach(node => {
          node.classList.add('active');
        });
      }, introDurationMs);
    }
  </script>
</body>
